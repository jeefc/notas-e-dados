baseURL: ""
defaultContentLanguage: pt
defaultContentLanguageInSubdir: false
languages:
  pt:
    languageCode: pt-BR
    languageDirection: ltr
    languageName: Português

title: Notas e Dados
theme: PaperMod

outputs:
  home:
    - HTML
    - RSS

params:
  env: production
  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"

  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowReadingTime: true
  ShowShareButtons: false
  defaultTheme: auto

  homeInfoParams:
    Title: "Olá. Sou o Jeferson."
    Content: |
      Trabalho com TI e atualmente exploro o mundo de Cloud, DevOps e Segurança. 
      <br><br>
      Este blog é meu caderno aberto. Um espaço sem muitas regras onde documento estudos para certificações (AWS, Cybersec), códigos em Django/Next.js e projetos independentes.
      <br><br>
      Além dos bits e bytes, escrevo sobre como a tecnologia esbarra na filosofia, nas relações de trabalho e na sociedade — porque a tecnologia nunca é neutra.
      <br><br><br>
      <a href="/posts/first-post/">Por que criei esse espaço? →</a>

  socialIcons:
    - name: "github"
      url: "https://github.com/jeefc"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/jefersoncostalica/"
    - name: "email"
      url: "mailto:jefersonlica@id.uff.br"

menu:
  main:
    - identifier: home
      name: início
      url: /
      weight: 1

    - identifier: sobre
      name: "bio"
      url: "/sobre/"
      weight: 2

    - identifier: posts
      name: posts
      url: /posts/
      weight: 3

    - identifier: tags
      name: tags
      url: /tags/
      weight: 4





markup:
  goldmark:
    renderer:
      unsafe: true
