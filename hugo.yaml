baseURL: ""
defaultContentLanguage: pt
defaultContentLanguageInSubdir: false
languages:
  pt:
    languageCode: pt-BR
    languageDirection: ltr
    languageName: Português

title: Notas e Dados
theme: PaperMod

outputs:
  home:
    - HTML
    - RSS

params:
  env: production
  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"

  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowReadingTime: true
  ShowShareButtons: false
  defaultTheme: auto

  homeInfoParams:
    Title: "Oi, eu sou o Jeferson."
    Content: |
      Estudante de Computação na UFF, com passagem pela TI antes de entrar na faculdade.
      Aqui registro o que estou aprendendo — programação, análise de dados e, de vez em quando, como a tecnologia se encaixa no mundo além das telas.
      <br><br>
      <a href="/posts/first-post/">Por que criei esse espaço? →</a>

  socialIcons:
    - name: "github"
      url: "https://github.com/jeefc"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/jefersoncostalica/"
    - name: "email"
      url: "mailto:jefersonlica@id.uff.br"

menu:
  main:
    - identifier: home
      name: início
      url: /
      weight: 1

    - identifier: sobre
      name: "bio"
      url: "/sobre/"
      weight: 2

    - identifier: posts
      name: posts
      url: /posts/
      weight: 3

    - identifier: tags
      name: tags
      url: /tags/
      weight: 4





markup:
  goldmark:
    renderer:
      unsafe: true
